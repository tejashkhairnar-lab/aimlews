<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Knight Fintech · EWS Risk Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6FA;--panel:#FFFFFF;--hi:#F0F4FC;--hi2:#E8EEF8;
  --border:#DDE3EE;--borderB:#C4CEDF;
  --gold:#E8920A;--goldL:#F5A520;--goldD:#FEF3E2;
  --red:#D63B3B;--redD:#FEF0F0;
  --amber:#D07A10;--amberD:#FEF5E6;
  --green:#1A9A5C;--greenD:#EDF8F2;
  --blue:#2563EB;--blueD:#EFF4FF;
  --purple:#6044CC;--purpleD:#F2EFFF;
  --teal:#0E8A78;--tealD:#EDF8F6;
  --navy:#0F2952;
  --slate:#5A6E8A;--muted:#94A3BC;--white:#1A2540;
  --mono:'JetBrains Mono',monospace;
  --sans:'Inter',system-ui,sans-serif;
}
body{background:var(--bg);color:var(--white);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--borderB);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulseG{0%{box-shadow:0 0 0 0 rgba(26,154,92,.3)}70%{box-shadow:0 0 0 7px rgba(26,154,92,0)}100%{box-shadow:0 0 0 0 rgba(26,154,92,0)}}
.fa{animation:fadeUp .4s ease both}
.si{animation:slideIn .35s ease both}
.dot-g{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulseG 2s infinite}
.topbar{background:#FFFFFF;border-bottom:2px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(15,41,82,.07);gap:0}
.logo-icon{width:34px;height:34px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.tab-btn{background:transparent;color:var(--slate);border:none;border-bottom:2px solid transparent;padding:0 14px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;height:54px;margin-bottom:-2px}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
.sctab.active{background:var(--navy)!important;color:#fff!important;}
.sctab:hover:not(.active){background:var(--hi2)!important;}
.tab-btn:hover:not(.active){color:var(--navy)}
.b-bar{background:#FFFFFF;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:10px}
.b-card{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;cursor:pointer;text-align:left;transition:all .2s;font-family:var(--sans)}
.b-card.active{background:#FFFFFF;border-color:var(--gold);box-shadow:0 2px 10px rgba(232,146,10,.14)}
.b-card:hover:not(.active){background:#FFFFFF;border-color:var(--borderB)}
.content{max-width:1440px;margin:0 auto;padding:20px 24px}
.card{background:#FFFFFF;border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(15,41,82,.06)}
.card0{background:#FFFFFF;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(15,41,82,.06)}
.pill{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:4px;padding:2px 7px;border:1px solid;display:inline-block;white-space:nowrap}
.pg{background:var(--greenD);color:var(--green);border-color:#1A9A5C22}
.pa{background:var(--amberD);color:var(--amber);border-color:#D07A1022}
.pr{background:var(--redD);color:var(--red);border-color:#D63B3B22}
.pb{background:var(--blueD);color:var(--blue);border-color:#2563EB22}
.pp{background:var(--purpleD);color:var(--purple);border-color:#6044CC22}
.pt{background:var(--tealD);color:var(--teal);border-color:#0E8A7822}
.pgo{background:var(--goldD);color:var(--gold);border-color:#E8920A22}
.lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:600}
.mono{font-family:var(--mono)}
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.agent-card{border-radius:10px;padding:13px 14px;cursor:pointer;transition:all .2s;border:1px solid;position:relative;background:#FFFFFF}
.agent-card:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,41,82,.1)}
.drill-wrap{display:grid;grid-template-columns:300px 1fr;gap:14px;align-items:start}
.drill-left{display:flex;flex-direction:column;gap:8px}
.drill-panel{background:#FFFFFF;border:1px solid var(--borderB);border-radius:12px;overflow:hidden;animation:slideIn .35s ease both;box-shadow:0 2px 12px rgba(15,41,82,.08)}
.drill-header{padding:14px 16px;border-bottom:1px solid var(--border);background:#FFFFFF}
.cat-section{border-bottom:1px solid var(--border)}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;cursor:pointer;transition:background .15s;user-select:none;background:#FFFFFF}
.cat-header:hover{background:var(--hi)}
.cat-body{padding:12px 16px 16px;background:var(--bg)}
.feat-row{margin-bottom:12px}
.feat-name{font-size:11px;color:var(--navy);font-weight:600;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.feat-val{font-size:12px;font-family:var(--mono);font-weight:700}
.iqr-track{height:8px;background:var(--hi2);border-radius:4px;position:relative;margin-top:4px;margin-bottom:2px;border:1px solid var(--border)}
.iqr-zone{position:absolute;top:0;bottom:0;border-radius:3px;background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.18)}
.iqr-marker{position:absolute;top:-4px;width:3px;height:16px;border-radius:2px;transform:translateX(-50%)}
.iqr-tick{position:absolute;top:100%;margin-top:3px;transform:translateX(-50%);font-size:8px;color:var(--muted);font-family:var(--mono);white-space:nowrap}
.rule-card{border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid;transition:all .3s}
.rule-triggered{background:var(--greenD);border-color:#1A9A5C33}
.rule-fired{background:var(--redD);border-color:#D63B3B33}
.rule-neutral{background:var(--bg);border-color:var(--border)}
.news-cat{background:var(--bg);border-radius:8px;padding:11px 13px;margin-bottom:8px;border:1px solid var(--border)}
.news-sent-bar{height:5px;background:var(--hi2);border-radius:3px;margin-top:6px;overflow:hidden}
.sub-tab-row{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.sub-tab{background:transparent;color:var(--slate);border:none;border-bottom:2px solid transparent;padding:8px 16px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-bottom:-2px}
.sub-tab.active{color:var(--navy);border-bottom-color:var(--gold);font-weight:700}
.sub-tab:hover:not(.active){color:var(--navy)}
.screen{display:none}.screen.active{display:block}
.kpi-tile{flex:1;background:#FFFFFF;border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(15,41,82,.05)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{padding:9px 14px;text-align:left;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg)}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:hover{background:var(--hi)}
tbody td{padding:9px 14px;color:var(--white)}
.shap-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cat-toggle{font-size:10px;color:var(--muted);transition:transform .2s}
.drill-panel::-webkit-scrollbar{width:3px}
.drill-panel::-webkit-scrollbar-thumb{background:var(--borderB)}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;margin-right:28px;flex-shrink:0">
    <div class="logo-icon">K</div>
    <div>
      <div style="font-size:13.5px;font-weight:800;color:var(--navy);letter-spacing:-.02em">Knight Fintech</div>
      <div style="font-size:8px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;font-weight:700">EWS · Predictive Risk</div>
    </div>
  </div>
  <div style="width:1px;height:20px;background:var(--border);margin-right:16px"></div>
  <div style="display:flex;gap:0">
    <button class="tab-btn active" onclick="switchMain('borrower',this)">🔍 Borrower Risk</button>
    <button class="tab-btn" onclick="switchMain('portfolio',this)">📊 Portfolio Analytics</button>
    <button class="tab-btn" onclick="switchMain('drift',this)">📋 Validation &amp; Governance</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:8px;align-items:center" id="top-right">
    <span class="pill pa">AUC 0.84 ↓</span>
    <span class="dot-g"></span>
    <span style="font-size:10px;color:var(--muted)">Live · 06:30 AM</span>
  </div>
</div>

<!-- BORROWER BAR -->
<div class="b-bar" id="b-bar">
  <button class="b-card active" onclick="selectBorrower(0,this)">
    <div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;font-weight:700">Sunrise Textiles Pvt Ltd</div><div style="font-size:9px;color:var(--muted);margin-top:2px">BL-7842 · Manufacturing · ₹2.8 Cr</div></div><div style="text-align:right"><div style="font-size:19px;font-weight:900;color:var(--amber);font-family:var(--mono)">67</div><div style="font-size:8.5px;font-weight:800;color:var(--amber)">WATCH</div></div></div>
  </button>
  <button class="b-card" onclick="selectBorrower(1,this)">
    <div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;font-weight:700">Apex Pharma Components Ltd</div><div style="font-size:9px;color:var(--muted);margin-top:2px">BL-4419 · Pharma · ₹7.4 Cr</div></div><div style="text-align:right"><div style="font-size:19px;font-weight:900;color:var(--red);font-family:var(--mono)">83</div><div style="font-size:8.5px;font-weight:800;color:var(--red)">HIGH</div></div></div>
  </button>
  <button class="b-card" onclick="selectBorrower(2,this)">
    <div style="display:flex;justify-content:space-between"><div><div style="font-size:11px;font-weight:700">GreenFields Agro Exports</div><div style="font-size:9px;color:var(--muted);margin-top:2px">BL-2931 · Agri &amp; Food · ₹1.2 Cr</div></div><div style="text-align:right"><div style="font-size:19px;font-weight:900;color:var(--green);font-family:var(--mono)">28</div><div style="font-size:8.5px;font-weight:800;color:var(--green)">LOW</div></div></div>
  </button>
</div>

<div class="content">

<!-- ══ BORROWER SCREEN ══ -->
<div class="screen active" id="screen-borrower">
  <div id="b-header" class="card fa" style="margin-bottom:14px;padding:13px 18px"></div>
  <div id="score-history-wrap" style="margin-bottom:14px"></div>
  <div class="sub-tab-row">
    <button class="sub-tab active" onclick="switchSub('agents',this)">Multi-Agent View</button>
    <button class="sub-tab" onclick="switchSub('shap',this)">Score Explainability</button>
  </div>
  <div class="screen active" id="sub-agents"><div id="agents-wrap"></div></div>
  <div class="screen" id="sub-shap"><div id="shap-wrap"></div></div>
</div>

<!-- ══ PORTFOLIO SCREEN ══ -->
<div class="screen" id="screen-portfolio">
  <!-- Filter bar -->
  <div style="background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.08em">Filter</span>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:9.5px;color:var(--muted)">Portfolio</span>
      <select id="pf-filter-portfolio" onchange="renderPortfolio()" style="font-size:10px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--navy);font-family:var(--sans);background:#fff">
        <option value="all">All Portfolios</option>
        <option value="msme_term">MSME Term Loan</option>
        <option value="wc_od">Working Capital OD</option>
        <option value="kisan">Kisan / Agri</option>
        <option value="corporate">Corporate</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:9.5px;color:var(--muted)">Industry</span>
      <select id="pf-filter-industry" onchange="renderPortfolio()" style="font-size:10px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--navy);font-family:var(--sans);background:#fff">
        <option value="all">All Industries</option>
        <option value="manufacturing">Manufacturing</option>
        <option value="pharma">Pharma & Chemicals</option>
        <option value="agri">Agriculture & Food</option>
        <option value="construction">Construction</option>
        <option value="transport">Transport & Logistics</option>
        <option value="retail">Retail & Trade</option>
        <option value="textile">Textile</option>
        <option value="infra">Infrastructure</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="font-size:9.5px;color:var(--muted)">Risk Grade</span>
      <select id="pf-filter-grade" onchange="renderPortfolio()" style="font-size:10px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--navy);font-family:var(--sans);background:#fff">
        <option value="all">All Grades</option>
        <option value="healthy">Healthy</option>
        <option value="watch">Watch</option>
        <option value="high">High Risk</option>
      </select>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
      <span id="pf-count" style="font-size:9.5px;color:var(--muted)">Showing all 2,847 accounts</span>
      <button onclick="resetPortfolioFilters()" style="font-size:9px;border:1px solid var(--border);border-radius:5px;padding:3px 8px;background:var(--hi);color:var(--slate);cursor:pointer;font-family:var(--sans)">Reset</button>
    </div>
  </div>
  <div id="portfolio-body"></div>
</div>

<!-- ══ VALIDATION & GOVERNANCE SCREEN ══ -->
<div class="screen" id="screen-drift">
  <div id="drift-body"></div>
</div>

</div><!-- content -->

<script>
// ══════════════════════════════════════════
// COLORS
// ══════════════════════════════════════════
const C={gold:'#E8920A',goldL:'#F5A520',navy:'#0F2952',red:'#D63B3B',amber:'#D07A10',green:'#1A9A5C',blue:'#2563EB',purple:'#6044CC',teal:'#0E8A78',slate:'#5A6E8A',muted:'#94A3BC',white:'#1A2540',hi:'#F0F4FC',hi2:'#E8EEF8',panel:'#FFFFFF',border:'#DDE3EE',borderB:'#C4CEDF',redD:'#FEF0F0',amberD:'#FEF5E6',greenD:'#EDF8F2',blueD:'#EFF4FF',purpleD:'#F2EFFF',tealD:'#EDF8F6',goldD:'#FEF3E2'};
const rC=s=>s<=30?C.red:s<=60?C.amber:C.green;
const rL=s=>s<=30?'HIGH RISK':s<=60?'WATCH':'HEALTHY';
const rD=s=>s<=30?C.redD:s<=60?C.amberD:C.greenD;
const rPill=s=>s<=30?'pr':s<=60?'pa':'pg';
const sC=r=>r==='high'?C.red:r==='med'?C.amber:C.green;
const sI=r=>r==='ok'?'✓':r==='med'?'⚠':'⛔';

// ══════════════════════════════════════════
// FEATURE DEFINITIONS PER AGENT
// ══════════════════════════════════════════
const AGENT_DEFS = {
  financial:{
    icon:'💳', name:'Financial Agent', color:C.blue, colorD:C.blueD,
    modelType:'Supervised ML · XGBoost / Random Forest / LSTM',
    approach:'supervised',
    description:'Trained on external ratings (CRISIL/CARE/ICRA) and CIBIL default labels. Three sub-models: Standalone Financials (absolute ratios), Financial Performance (YoY trends), and Peer Comparison (company minus sector median) — combined into a single financial PD.',
    categories:[
      {name:'Standalone Financials', key:'standalone', features:[
        {name:'Revenue (₹ Cr TTM)',              val:'₹18.4 Cr', q1:'₹12',  q3:'₹42',  median:'₹24',    pos:21, risk:'med', contrib:+3,  dir:'hb', brief:'Higher is better · Below median — smaller revenue base limits debt repayment capacity'},
        {name:'Debt-Equity Ratio',               val:'2.14×',unit:'×',    q1:'0.8×', q3:'2.8×', median:'1.6×',   pos:73, risk:'med', contrib:+8,  dir:'lb', brief:'Lower is better · Healthy <1.5× · Above median leverage — business is debt-heavy relative to equity'},
        {name:'EBITDA Margin (%)',               val:'8.2%',     q1:'6%',   q3:'18%',  median:'11%',    pos:18, risk:'med', contrib:+9,  dir:'hb', brief:'Higher is better · Below median — compressed margins reduce ability to service debt obligations'},
        {name:'Operating CF / Debt Obligations', val:'0.82×',    q1:'0.9×', q3:'2.4×', median:'1.4×',   pos:3,  risk:'high',contrib:+14, dir:'hb', brief:'Higher is better · Safe zone ≥1.0× · Below Q1 — cash flow insufficient to cover debt obligations'},
        {name:'Working Capital Cycle (days)',    val:'62 days',  q1:'32',   q3:'78',   median:'48',     pos:71, risk:'med', contrib:+7,  dir:'lb', brief:'Lower is better · Fewer days = faster cash conversion · Above median — working capital tied up longer'},
        {name:'Gross Current Asset Days',        val:'88 days',unit:'days',  q1:'45',   q3:'95',   median:'64',     pos:76, risk:'med', contrib:+6,  dir:'lb', brief:'Lower is better · Measures how long receivables + inventory sit before converting to cash · Near Q3'},
        {name:'Interest Coverage Ratio',         val:'1.9×',unit:'×',     q1:'1.4×', q3:'5.2×', median:'2.8×',   pos:13, risk:'high',contrib:+11, dir:'hb', brief:'Higher is better · Safe zone ≥2.5× · Below median — earnings barely cover interest expense'},
        {name:'ROCE (%)',                        val:'11.4%',    q1:'8%',   q3:'24%',  median:'15%',    pos:21, risk:'med', contrib:+5,  dir:'hb', brief:'Higher is better · Below median — capital deployed in business generating below-average returns'},
      ]},
      {name:'Financial Performance (Trends)', key:'performance', features:[
        {name:'Revenue Growth YoY (%)',          val:'+4.2%',    q1:'-5%',  q3:'+18%', median:'+8%',    pos:40, risk:'med', contrib:+6,  dir:'hb', brief:'Higher is better · Below median growth — losing revenue momentum relative to sector peers'},
        {name:'EBITDA Margin Δ YoY (pp)',        val:'−2.1pp',   q1:'-4pp', q3:'+3pp', median:'+0.5pp', pos:27, risk:'med', contrib:+7,  dir:'hb', brief:'Higher is better · Positive = margin expanding · Margin contracting YoY signals cost pressure or pricing erosion'},
        {name:'Debt Δ MoM (%)',                  val:'+3.4%',    q1:'-2%',  q3:'+5%',  median:'+1%',    pos:77, risk:'high',contrib:+10, dir:'lb', brief:'Lower is better · Negative = deleveraging · Debt growing faster than median — leverage building month-on-month'},
        {name:'OCF Trend (6M slope)',            val:'−0.14',unit:'slope',    q1:'-0.1', q3:'+0.2', median:'+0.05',  pos:3,  risk:'high',contrib:+12, dir:'hb', brief:'Higher is better · Positive = growing cash flow · Below Q1 — operating cash generation deteriorating each month'},
        {name:'Interest Coverage Δ YoY',         val:'−0.6×',unit:'× YoY',    q1:'-0.8×',q3:'+1×',  median:'+0.1×',  pos:11, risk:'med', contrib:+8,  dir:'hb', brief:'Higher is better · Positive = coverage improving · Coverage declining year-on-year — debt servicing capacity weakening'},
        {name:'WC Cycle Δ (days)',               val:'+8 days',  q1:'-10',  q3:'+12',  median:'+2',     pos:82, risk:'high',contrib:+9,  dir:'lb', brief:'Lower is better · Negative = cycle shortening (good) · Cycle elongating — cash is getting trapped in operations longer'},
      ]},
      {name:'Financial Peer Comparison', key:'peer', features:[
        {name:'Revenue Growth vs Sector Median', val:'−3.8pp',   q1:'-8pp', q3:'+5pp', median:'0pp',    pos:32, risk:'med', contrib:+6,  dir:'hb', brief:'Higher is better · Positive = outgrowing sector · Growing 3.8pp slower than sector median — losing competitive ground'},
        {name:'EBITDA Margin vs Peers',          val:'−2.9pp',   q1:'-6pp', q3:'+4pp', median:'-1pp',   pos:31, risk:'med', contrib:+5,  dir:'hb', brief:'Higher is better · Positive = more profitable than peers · Margin 2.9pp below sector — cost structure disadvantage'},
        {name:'Debt-Equity vs Sector Median',    val:'+0.54×',   q1:'-0.6×',q3:'+0.9×',median:'+0.1×', pos:76, risk:'med', contrib:+7,  dir:'lb', brief:'Lower is better · Positive = more leveraged than peers · 0.54× more D/E than sector median — relatively over-leveraged'},
        {name:'Interest Coverage vs Peers',      val:'−0.9×',    q1:'-2×',  q3:'+1×',  median:'-0.3×',  pos:37, risk:'med', contrib:+5,  dir:'hb', brief:'Higher is better · Positive = stronger than peers · Coverage 0.9× below sector average — debt service capacity gap'},
        {name:'ROCE vs Sector Median',           val:'−3.6pp',   q1:'-8pp', q3:'+3pp', median:'-1pp',   pos:40, risk:'med', contrib:+4,  dir:'hb', brief:'Higher is better · Positive = outperforming peers · Capital efficiency 3.6pp below sector median'},
      ]},
    ],
    eventDate:{label:'FY 2023–24', iso:'2024-03-31', note:'Latest available audited financials (annual)'},
    lastUpdated:{date:'05 Mar 2025', note:'Quarterly financials refreshed from CBS + borrower upload'},
    freshness:{score:91, latestDate:'Mar 05, 2025', latestEvent:'Quarterly financials uploaded'},
    coverage:{score:84, available:20, total:24},
    confidence:{score:72, note:'OCF/Debt and Interest Coverage lie in lower IQR quartile, reducing confidence'}
  },
  behavioural:{

// SVG HELPERS
// ══════════════════════════════════════════
function spark(data,color,w,h){
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-2-((v-mn)/rng)*(h-6)}`).join(' ');
  const id='sg'+Math.random().toString(36).slice(2,6);
  return `<svg width="${w}" height="${h}" style="overflow:visible"><defs><linearGradient id="${id}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="0,${h} ${pts} ${w},${h}" fill="url(#${id})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" style="filter:drop-shadow(0 0 3px ${color}88)"/></svg>`;
}

function buildGauge(score,size){
  const cx=size/2,cy=size/2+8,R=size*0.37;
  const toR=d=>d*Math.PI/180;
  const arc=(sa,sw)=>{const s=toR(sa),e=toR(sa+sw);const x1=cx+R*Math.cos(s),y1=cy+R*Math.sin(s),x2=cx+R*Math.cos(e),y2=cy+R*Math.sin(e);return `M${x1},${y1} A${R},${R} 0 ${sw>180?1:0},1 ${x2},${y2}`;};
  const SA=-210,ST=240,fill=ST*(score/100),col=rC(score);
  const nA=toR(SA+fill);
  const tks=[0,25,50,75,100].map(v=>{const a=toR(SA+(v/100)*ST);return `<line x1="${cx+(R+7)*Math.cos(a)}" y1="${cy+(R+7)*Math.sin(a)}" x2="${cx+(R+13)*Math.cos(a)}" y2="${cy+(R+13)*Math.sin(a)}" stroke="${C.muted}" stroke-width="1.5"/>`;}).join('');
  return `<svg width="${size}" height="${size*.78}" style="overflow:visible"><path d="${arc(SA,ST)}" fill="none" stroke="${C.border}" stroke-width="9" stroke-linecap="round"/><path d="${arc(SA,fill)}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round" style="filter:drop-shadow(0 0 7px ${col}99)"/>${tks}<line x1="${cx}" y1="${cy}" x2="${cx+(R*.7)*Math.cos(nA)}" y2="${cy+(R*.7)*Math.sin(nA)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round" style="filter:drop-shadow(0 0 5px ${col})"/><circle cx="${cx}" cy="${cy}" r="5" fill="${col}" style="filter:drop-shadow(0 0 5px ${col})"/><text x="${cx}" y="${cy-12}" text-anchor="middle" fill="${col}" style="font-size:30px;font-weight:900;font-family:var(--mono)">${score}</text><text x="${cx}" y="${cy+4}" text-anchor="middle" fill="${C.muted}" style="font-size:9px;font-family:var(--sans)">/100 · Health</text><text x="${cx-R}" y="${cy+22}" text-anchor="middle" fill="${C.red}" style="font-size:8px;font-family:var(--mono)">RISK</text><text x="${cx+R}" y="${cy+22}" text-anchor="middle" fill="${C.green}" style="font-size:8px;font-family:var(--mono)">SAFE</text></svg>`;
}

function buildIQR(feat){
  const col = sC(feat.risk);
  // pos = 0–100 on the track
  const markerLeft = Math.max(2,Math.min(96,feat.pos));
  return `<div class="iqr-track">
    <div class="iqr-zone" style="left:25%;right:25%"></div>
    <div class="iqr-marker" style="left:${markerLeft}%;background:${col};box-shadow:0 0 6px ${col}88"></div>
    <span class="iqr-tick" style="left:25%">Q1</span>
    <span class="iqr-tick" style="left:50%">Mdn</span>
    <span class="iqr-tick" style="left:75%">Q3</span>

    <span style="font-size:8.5px;color:var(--muted);font-family:var(--mono)">${feat.q3}</span>
  </div>`;
}

// Compute category score from available data; returns null when all features are NA
function catScore(cat){
  const f=cat.features||[];
  if(cat.subScore!=null) return cat.subScore;
  const active=f.filter(x=>x.val!=='NA');
  if(active.length===0) return null; // NA category
  if(active.every(x=>x.rangeScore!=null)){
    const tw=active.reduce((s,x)=>s+(x.weight||1),0)||1;
    return Math.round(active.reduce((s,x)=>s+(x.rangeScore||0)*(x.weight||1),0)/tw);
  }
  const rMap={ok:90,med:50,high:12};
  const tw=active.reduce((s,x)=>s+(x.weight||1),0)||1;
  return Math.round(active.reduce((s,x)=>s+(rMap[x.risk]||50)*(x.weight||1),0)/tw);
}

// Parse name → cleanName + unit  e.g. "Revenue (₹ Cr TTM)" → ["Revenue","₹ Cr TTM"]
function parseName(f){
  const m=f.name.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
  return [m?m[1].trim():f.name, f.unit||(m?m[2]:'')];
}

// One category section: collapsible header + feature rows
// Feature row: name · unit (muted mono) · value (coloured) — same for every agent
function renderCatSection(cat, color, contribPct, isOpen){
  const cs  = catScore(cat);  // null = NA (no data)
  const csC = cs==null?C.muted:cs>=65?C.green:cs>=35?C.amber:C.red;
  const feats = cat.features||[];

  const featRows = feats.map(f=>{
    const [name,unit] = parseName(f);
    const vc = f.val==='NA' ? C.muted : sC(f.risk);
    return `<div style="display:flex;align-items:center;gap:10px;padding:7px 14px;border-bottom:0.5px solid var(--border)">
      <div style="flex:1;min-width:0">
        <span style="font-size:10px;font-weight:600;color:var(--navy)">${name}</span>
        ${unit?`<span style="font-size:8px;color:var(--muted);font-family:var(--mono);margin-left:6px">${unit}</span>`:'<span style="font-size:8px;color:var(--red);font-family:var(--mono);margin-left:6px">no unit</span>'}
      </div>
      <div style="font-size:15px;font-weight:900;color:${vc};font-family:var(--mono);flex-shrink:0">${f.val}</div>
    </div>`;

  return `<div class="cat-section" style="border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:8px">

// Compute contribution % per category relative to agent
function catContribPct(def, cat){
  const allWt=(def.categories||[]).reduce((s,c)=>{
    if(c.type==='supervised') return s+25; // bureau fixed
    return s+c.features.reduce((fs,f)=>fs+(f.weight||0),0);
  },0)||1;
  const thisWt=cat.type==='supervised'?25:cat.features.reduce((s,f)=>s+(f.weight||0),0);
  return Math.round(thisWt/allWt*100);
}

// News: map newsCategories into standard renderCatSection format
function renderNewsCategories(def){
  return def.newsCategories.map((cat,i)=>{
    const avgSentiment=Math.round(cat.articles.reduce((s,a)=>s+a.nlpScore,0)/cat.articles.length);
    const synCat={
      name:cat.name, key:'news_'+i,
      subScore:100-avgSentiment,
      features:cat.articles.map(a=>({
        name:a.headline,
        unit:a.source,
        val:a.nlpScore+'/100',
        risk:a.nlpScore>60?'high':a.nlpScore>35?'med':'ok',
      }))
    };
    const isOpen=openCats[synCat.key]!==false;
    return renderCatSection(synCat, C.gold, cat.weight, isOpen);
  }).join('');
}

    (def.categories||[]).forEach(cat=>{

    });
    return `<div style="display:flex;flex-direction:column;gap:10px">
      ${groups.map(g=>{
        const catTotal=g.features.reduce((s,f)=>s+Math.abs(f.contrib||0),0);

        return `<div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:5px">
            <div style="font-size:9px;font-weight:800;color:${col};text-transform:uppercase;letter-spacing:.07em">${g.name}</div>

      }).join('')}

  if(def.categoryWeights){
    const col=def.color;
    const isNews=def.approach==='semisupervised'&&!!def.newsCategories;
    return `<div style="background:${def.colorD};border:1px solid ${col}28;border-radius:10px;padding:13px 14px;margin-bottom:12px">

        <div style="font-size:8.5px;color:var(--muted)">${isNews?'Admin-configured weights · NLP model scores each article · score = 100 − Σ(weight × avg sentiment)':'Sub-model weights + rule overlay · configured in admin portal'}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${def.categoryWeights.map(cw=>{
          const hasType=!!cw.type;
          const typeCol=cw.type&&(cw.type==='Rule-based'||cw.type==='Rules overlay')?C.amber:col;
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:rgba(255,255,255,0.5);border-radius:7px;border:1px solid ${col}18">
            <div style="flex:1">
              <div style="font-size:10px;font-weight:700;color:var(--slate)">${cw.category}</div>
              <div style="font-size:8px;color:var(--muted);margin-top:1px">${cw.note}</div>
            </div>
            ${hasType?`<span style="background:${typeCol}18;border-radius:4px;padding:2px 7px;font-size:8px;font-weight:700;color:${typeCol};flex-shrink:0">${cw.type}</span>`:''}
            ${cw.weight!=null
              ?`<div style="width:90px;flex-shrink:0">
                  <div style="height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:2px">
                    <div style="height:100%;width:${cw.weight}%;background:${col};border-radius:3px"></div>
                  </div>
                  <div style="font-size:9.5px;font-weight:800;color:${col};text-align:right;font-family:var(--mono)">${cw.weight}%</div>
                </div>`
              :`<div style="width:90px;font-size:8.5px;color:var(--muted);text-align:right;flex-shrink:0">overlay</div>`
            }
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return '';
}

// ══════════════════════════════════════════
// COMPOSITE DATE HELPERS
// ══════════════════════════════════════════
function getCompositeDates(){
  const keys=['financial','behavioural','consent','news','legal','compliance','management'];
  const defs=keys.map(k=>AGENT_DEFS[k]);
  // max event date by ISO string
  const eventISOs=defs.map(d=>d.eventDate?d.eventDate.iso:'2000-01-01');
  const maxIdx=eventISOs.reduce((mi,v,i)=>v>eventISOs[mi]?i:mi,0);
  const maxEv=defs[maxIdx].eventDate;
  // max lastUpdated — parse as day MMM YYYY
  const updDates=defs.map(d=>d.lastUpdated?d.lastUpdated.date:'—');
  return {eventDate:maxEv, lastUpdated:updDates[0], allUpdates:updDates, eventAgent:AGENT_DEFS[keys[maxIdx]].name};
}


// ══════════════════════════════════════════
// DECISION CONFIDENCE SCORE
// ══════════════════════════════════════════
function getDecisionConfidence(){
  const mlKeys=['financial','behavioural','consent'];
  const edKeys=['news','legal','compliance','management']; // event-driven: crawl freshness only

  // ML agents: freshness × coverage × confidence
  const mlScores=mlKeys.map(k=>{
    const d=AGENT_DEFS[k];
    return {
      key:k,
      freshness:d.freshness.score,
      coverage:d.coverage.score,
      confidence:d.confidence.score,
      combined:Math.round(d.freshness.score*0.30 + d.coverage.score*0.30 + d.confidence.score*0.40)
    };
  });

  // Event-driven agents: only freshness of last crawl matters
  // No events = healthy signal — does NOT reduce confidence
  const edScores=edKeys.map(k=>{
    const d=AGENT_DEFS[k];
    const crawlOk=(d.crawlStatus&&d.crawlStatus.ok!==false)||true;
    return {
      key:k,
      freshness:d.freshness.score,
      crawlOk,
      combined:crawlOk ? d.freshness.score : 0 // crawl failure = zero contribution
    };
  });

  const mlAvg=Math.round(mlScores.reduce((s,x)=>s+x.combined,0)/mlScores.length);
  const edAvg=Math.round(edScores.reduce((s,x)=>s+x.combined,0)/edScores.length);
  // ML agents carry more weight in decision confidence (70%) vs event-driven (30%)
  const combined=Math.round(mlAvg*0.70 + edAvg*0.30);

  const avgFresh=Math.round([...mlScores,...edScores].reduce((s,x)=>s+x.freshness,0)/6);
  const avgCovg=Math.round(mlScores.reduce((s,x)=>s+x.coverage,0)/mlScores.length);
  const avgConf=Math.round(mlScores.reduce((s,x)=>s+x.confidence,0)/mlScores.length);

  const grade=combined>=80?'HIGH':combined>=65?'MODERATE':'LOW';
  const color=combined>=80?C.green:combined>=65?C.amber:C.red;
  return {combined, avgFresh, avgCovg, avgConf, mlAvg, edAvg, grade, color, mlScores, edScores};
}

  const n=rows.length;
  const agentMeta={
    financial: {color:'#2563EB',label:'Financial Agent'},
    behavioural:{color:'#6044CC',label:'Behavioural Agent'},
    consent:    {color:'#0E8A78',label:'Consent Agent'},
    news:       {color:'#E8920A',label:'News & Sentiment Agent'},
    legal:      {color:'#D07A10',label:'Legal Agent'},
    compliance: {color:'#1A9A5C',label:'Compliance Agent'},
    management: {color:'#5A6E8A',label:'Management Risk Agent'},

  const allAgents=[
    {key:'financial',  color:'#2563EB',label:'Financial'},
    {key:'behavioural',color:'#6044CC',label:'Behavioural'},
    {key:'consent',    color:'#0E8A78',label:'Consent'},

    {key:'legal',      color:'#D07A10',label:'Legal'},
    {key:'compliance', color:'#1A9A5C',label:'Compliance'},
    {key:'management', color:'#5A6E8A',label:'Management'},
  ];
  const lineKey=agentKey||'composite';
  const lineColor=agentKey?agentMeta[agentKey].color:'#0F2952';
  const lineLabel=agentKey?agentMeta[agentKey].label:'Composite';
  const showAll=!agentKey;

  const W=880,H=260,PL=42,PR=20,PT=18,PB=52;
  const CW=W-PL-PR,CH=H-PT-PB;
  const xOf=i=>PL+(i/(n-1))*CW;
  const yOf=v=>PT+CH-(v/100)*CH;

  let svg='';

  // Risk zone bands
  const zones=[
    {from:80,to:100,col:'#1A9A5C',lbl:'HEALTHY'},
    {from:60,to:80, col:'#D07A10',lbl:'WATCH'},
    {from:0, to:60, col:'#D63B3B',lbl:'HIGH RISK'},
  ];
  zones.forEach(z=>{
    svg+=`<rect x="${xOf(0)}" y="${yOf(z.to)}" width="${CW}" height="${yOf(z.from)-yOf(z.to)}" fill="${z.col}" fill-opacity="0.05"/>`;
    svg+=`<text x="${xOf(n-1)+8}" y="${(yOf(z.to)+yOf(z.from))/2+3.5}" fill="${z.col}" font-size="8" font-family="Inter,sans-serif" font-weight="700" opacity="0.85">${z.lbl}</text>`;

  const pts=rows.map((_,i)=>`${xOf(i)},${yOf(rows[i][lineKey])}`).join(' ');

  const legY=H-10;
  legItems.forEach(({color,label,w})=>{
    leg+=`<line x1="${legX}" y1="${legY}" x2="${legX+18}" y2="${legY}" stroke="${color}" stroke-width="${w}"/>`;
    leg+=`<circle cx="${legX+9}" cy="${legY}" r="3" fill="${color}"/>`;
    leg+=`<text x="${legX+22}" y="${legY+3.5}" fill="#5A6E8A" font-size="9.5" font-family="Inter,sans-serif">${label}</text>`;
    legX+=label.length*6.2+36;
  });

  // Delta stats
  const first=rows[0][lineKey],last=rows[n-1][lineKey];
  const delta=last-first;
  const dCol=delta<-15?'#D63B3B':delta<-5?'#D07A10':delta>15?'#1A9A5C':delta>5?'#0E8A78':'#5A6E8A';
  const dLbl=(delta>0?'+':'')+delta;
  const titleLine=agentKey?lineLabel+' · Score Trend':'Composite Score Trend';

  return `<div style="background:#fff;border:1px solid ${agentKey?lineColor+'44':'#DDE3EE'};border-radius:12px;padding:16px 18px;transition:border-color .25s">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px">

        <div style="display:flex;align-items:center;gap:8px">
          ${agentKey?`<div style="width:10px;height:10px;border-radius:50%;background:${lineColor}"></div>`:''}
          <div style="font-size:13px;font-weight:800;color:#0F2952">${titleLine} &nbsp;·&nbsp; Last 2 Years · Quarterly</div>
        </div>
        <div style="font-size:9px;color:#94A3BC;margin-top:3px">${agentKey?'Click another agent in the panel to switch · ':''}Higher = healthier · Each point = end-of-quarter score</div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="background:#F0F4FC;border:1px solid #DDE3EE;border-radius:8px;padding:6px 14px;text-align:center">
          <div style="font-size:8px;color:#94A3BC;font-weight:700;text-transform:uppercase;letter-spacing:.06em">2Y Change</div>
          <div style="font-size:20px;font-weight:900;color:${dCol};font-family:var(--mono);line-height:1.1">${dLbl}</div>
        </div>
        <div style="background:${agentKey?lineColor+'11':'#F0F4FC'};border:1px solid ${agentKey?lineColor+'44':'#DDE3EE'};border-radius:8px;padding:6px 14px;text-align:center">
          <div style="font-size:8px;color:#94A3BC;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Latest Score</div>
          <div style="font-size:20px;font-weight:900;color:${agentKey?lineColor:rC(last)};font-family:var(--mono);line-height:1.1">${last}</div>
        </div>
      </div>
    </div>
    <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="overflow:visible;width:100%;max-width:${W}px">
      ${svg}${leg}
    </svg>
  </div>`;
}

function renderShap(){
  const b=BORROWERS[currentBorrower];

  // Agent roster with model type context
  const agents=[
    {key:'financial',  color:C.blue,   icon:'📊', name:'Financial Health',
     modelType:'Supervised ML', modelNote:'XGBoost trained on audited financials — labels from CRISIL/CARE ratings'},
    {key:'behavioural',color:C.purple, icon:'🔄', name:'Account Behaviour',
     modelType:'Supervised ML', modelNote:'Logistic regression on CBS transaction history — labels from NPA events'},
    {key:'consent',    color:C.teal,   icon:'🔐', name:'GST & Bank Data',
     modelType:'ML + Rules',    modelNote:'ML scores combined with 8 triangulation rules that fire on consent data patterns'},
    {key:'news',       color:C.gold,   icon:'📰', name:'News & Sentiment',
     modelType:'ML + Rules',    modelNote:'NLP sentiment model weighted by category rules configured in admin portal'},
    {key:'legal',      color:C.amber,  icon:'⚖️', name:'Legal Standing',
     modelType:'Rule-Based',    modelNote:'Each legal event type has a configured severity weight — score is cumulative flag score'},
    {key:'compliance', color:C.green,  icon:'📋', name:'Regulatory Filings',
     modelType:'Rule-Based',    modelNote:'Recency-weighted filing compliance across GST, EPFO and statutory returns'},
    {key:'management', color:C.slate,  icon:'👔', name:'Management Risk',
     modelType:'Unsupervised',  modelNote:'Event-driven + qualitative on director stability, promoter pledges and leadership quality'},
  ];

  const edAgents=new Set(['news','legal','compliance','management']);

  // ── Weight computation ──────────────────────────────────────────────
  // ML agents (financial, behavioural, consent): effective weight = base × freshness × coverage × confidence
  // Event-driven agents (news, legal, compliance): keep full base weight when crawl ok;
  //   if crawl FAILED → weight is absent and redistributed proportionally to active agents.
  //   "No events found" is a healthy signal — the agent's weight does NOT redistribute.
  const baseW={financial:22,behavioural:22,consent:18,news:10,legal:10,compliance:10,management:8};
  let raw={}, rawTotal=0;
  agents.forEach(({key})=>{
    const d=AGENT_DEFS[key];
    if(edAgents.has(key)){
      // Event-driven: full base weight if crawl ok, zero if crawl failed
      const crawlOk=(d.crawlStatus&&d.crawlStatus.ok!==false)||true;
      raw[key]=crawlOk ? baseW[key] : 0;
    } else {
      // ML agents: quality-weighted
      raw[key]=baseW[key]*(d.freshness.score/100)*(d.coverage.score/100)*(d.confidence.score/100);
    }
    rawTotal+=raw[key];
  });

  // Normalise so all effective weights sum to 100
  // This naturally redistributes any absent agent's weight to active agents proportionally
  const wEff={};
  agents.forEach(({key})=>{ wEff[key]=Math.round((raw[key]/rawTotal)*100); });
  const absentAgents=agents.filter(({key})=>raw[key]===0).map(({key})=>key);

  // Agent contribution to composite: agentScore × effectiveWeight / 100
  const aScore=b.agentScores;
  let agentContrib={}, contribTotal=0;
  agents.forEach(({key})=>{ agentContrib[key]=Math.round(aScore[key]*wEff[key]/100); contribTotal+=agentContrib[key]; });

  // Top features across all agents
  const allFeats=[];
  agents.forEach(({key,color,name:aname})=>{
    const def=AGENT_DEFS[key];
    if(def.categories) def.categories.forEach(cat=>(cat.features||[]).forEach(f=>allFeats.push({...f,agentKey:key,agentName:aname,color})));
  });
  const maxC=Math.max(...allFeats.map(f=>Math.abs(f.contrib||0)),1);
  const riskFeats=allFeats.filter(f=>(f.contrib||0)>0).sort((a,b)=>b.contrib-a.contrib).slice(0,8);
  const goodFeats=allFeats.filter(f=>(f.contrib||0)<0).sort((a,b)=>a.contrib-b.contrib).slice(0,5);
  const maxAgent=Math.max(...agents.map(({key})=>agentContrib[key]),1);

  document.getElementById('shap-wrap').innerHTML=`

  <!-- Architecture strip -->
  <div style="background:var(--hi);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:14px">
    <div style="font-size:10px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em">How the composite score is built</div>
    <div style="display:flex;align-items:center;gap:0;flex-wrap:wrap">
      ${agents.map(({key,color,icon,name,modelType})=>`
        <div style="display:flex;align-items:center;gap:0">
          <div style="background:#fff;border:1px solid ${color}44;border-radius:8px;padding:7px 10px;text-align:center;min-width:90px">
            <div style="font-size:13px">${icon}</div>
            <div style="font-size:9px;font-weight:700;color:${color};margin-top:2px">${name}</div>
            <div style="font-size:7.5px;color:var(--muted);margin-top:2px">${modelType}</div>
            <div style="font-size:11px;font-weight:900;color:${rC(aScore[key])};font-family:var(--mono);margin-top:4px">${aScore[key]}</div>
          </div>
          <div style="font-size:10px;color:var(--muted);padding:0 4px">→</div>
        </div>`).join('')}
      <div style="background:${C.navy};border-radius:8px;padding:10px 14px;text-align:center;color:#fff;min-width:90px">
        <div style="font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:0.7;margin-bottom:2px">Composite</div>
        <div style="font-size:8px;opacity:0.6;margin-bottom:4px">Semi-supervised model<br>trained on agent outputs</div>
        <div style="font-size:22px;font-weight:900;font-family:var(--mono);color:${rC(b.score)}">${b.score}</div>
      </div>
    </div>
  </div>

  <!-- Two columns: Agent contributions | Feature signals -->
  <div style="display:grid;grid-template-columns:300px 1fr;gap:14px">

    <!-- Agent contributions -->
    <div class="card" style="padding:16px">
      <div style="font-size:12px;font-weight:800;color:var(--navy);margin-bottom:3px">Agent contributions</div>
      <div style="font-size:9px;color:var(--muted);margin-bottom:10px;line-height:1.5">Effective weights after data quality adjustment. <span style="color:${C.amber}">Event-driven agents</span> keep their base weight when their data source is live — no events = healthy signal, weight stays. Weight only redistributes if the crawl/source <em>fails</em>.</div>
      ${agents.map(({key,color,icon,name})=>{
        const sc=aScore[key], ct=agentContrib[key], scCol=rC(sc);
        const barW=Math.round((ct/maxAgent)*100);
        const isED=edAgents.has(key);
        const isAbsent=raw[key]===0;
        return `<div style="margin-bottom:11px;opacity:${isAbsent?0.45:1}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:12px">${icon}</span>
            <span style="font-size:10px;font-weight:600;color:var(--slate);flex:1">${name}</span>
            ${isED?`<span style="font-size:7px;font-weight:700;color:${C.amber};background:${C.amberD};border-radius:3px;padding:1px 5px">EVENT-DRIVEN</span>`:''}
            ${isAbsent?`<span style="font-size:7px;font-weight:700;color:${C.red}">REDISTRIBUTED</span>`:''}
            <span style="font-size:9px;color:var(--muted)">score</span>
            <span style="font-size:11px;font-weight:800;color:${scCol};font-family:var(--mono);width:24px;text-align:right">${sc}</span>
          </div>
          <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${color};border-radius:4px"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:2px">
            <span style="font-size:7.5px;color:var(--muted)">${wEff[key]}% effective weight${isED?` (base ${baseW[key]}%, full — crawl ok)`:''}</span>
            <span style="font-size:8px;font-weight:700;color:${color};font-family:var(--mono)">+${ct} pts</span>
          </div>
        </div>`;
      }).join('')}
      <div style="border-top:2px solid var(--navy);padding-top:8px;display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:10px;font-weight:700;color:var(--navy)">Composite score</span>
        <span style="font-size:18px;font-weight:900;color:${rC(b.score)};font-family:var(--mono)">${b.score}</span>
      </div>
    </div>

    <!-- Feature signals -->
    <div style="display:flex;flex-direction:column;gap:12px">

      <div class="card" style="padding:16px">
        <div style="font-size:12px;font-weight:800;color:${C.red};margin-bottom:3px">🔴 Pulling the score down</div>
        <div style="font-size:9px;color:var(--muted);margin-bottom:12px">These signals are weak or stressed — they are reducing the health score. Longer bar = stronger impact.</div>
        ${riskFeats.map(f=>{
          const bw=Math.round((f.contrib/maxC)*100);
          return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
            <div style="width:6px;height:6px;border-radius:50%;background:${f.color};flex-shrink:0;margin-top:1px"></div>
            <div style="width:170px;flex-shrink:0">
              <div style="font-size:9.5px;font-weight:600;color:var(--slate)">${f.name}</div>
              <div style="font-size:8px;color:var(--muted)">${f.agentName} · <strong style="color:var(--slate)">${f.val}</strong></div>
            </div>
            <div style="flex:1;height:8px;background:#FEF0F0;border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${bw}%;background:${C.red};border-radius:4px;opacity:0.72"></div>
            </div>
            <div style="font-size:9.5px;font-weight:800;color:${C.red};font-family:var(--mono);width:28px;text-align:right">−${f.contrib}</div>
          </div>`;
        }).join('')}
      </div>

      <div class="card" style="padding:16px">
        <div style="font-size:12px;font-weight:800;color:${C.green};margin-bottom:3px">🟢 Supporting the score</div>
        <div style="font-size:9px;color:var(--muted);margin-bottom:12px">These signals are healthy — they are holding the score up. Longer bar = stronger support.</div>
        ${goodFeats.length?goodFeats.map(f=>{
          const bw=Math.round((Math.abs(f.contrib)/maxC)*100);
          return `<div style="display:flex;align-items:center;gap:9px;margin-bottom:8px">
            <div style="width:6px;height:6px;border-radius:50%;background:${f.color};flex-shrink:0;margin-top:1px"></div>
            <div style="width:170px;flex-shrink:0">
              <div style="font-size:9.5px;font-weight:600;color:var(--slate)">${f.name}</div>
              <div style="font-size:8px;color:var(--muted)">${f.agentName} · <strong style="color:var(--slate)">${f.val}</strong></div>
            </div>
            <div style="flex:1;height:8px;background:#EDF8F2;border-radius:4px;overflow:hidden">
              <div style="height:100%;width:${bw}%;background:${C.green};border-radius:4px;opacity:0.72"></div>
            </div>
            <div style="font-size:9.5px;font-weight:800;color:${C.green};font-family:var(--mono);width:28px;text-align:right">+${Math.abs(f.contrib)}</div>
          </div>`;
        }).join(''):`<div style="font-size:10px;color:var(--muted);padding:8px 0">No strong positive signals for this borrower at this time.</div>`}
      </div>

    </div>
  </div>`;
}

  labels:['Healthy','Watch','High Risk'],
  data:[
    [82, 14, 4 ],  // Currently Healthy → predicted to be: 82% Healthy, 14% Watch, 4% High Risk
    [18, 62, 20],  // Currently Watch
    [8,  24, 68],  // Currently High Risk
  ]
};

// Portfolio 12-month predicted default rate trend
const PD_FORECAST=[
  {q:'Q2 FY23',actual:14.2,predicted:null},{q:'Q3 FY23',actual:15.8,predicted:null},
  {q:'Q4 FY23',actual:16.4,predicted:null},{q:'Q1 FY24',actual:17.1,predicted:null},
  {q:'Q2 FY24',actual:17.8,predicted:null},{q:'Q3 FY24',actual:18.4,predicted:null},
  {q:'Q4 FY24',actual:19.1,predicted:null},{q:'Q1 FY25',actual:19.4,predicted:19.4},
  {q:'Q2 FY25',actual:null, predicted:20.8},{q:'Q3 FY25',actual:null,predicted:22.1},
  {q:'Q4 FY25',actual:null, predicted:21.4},
];

function getPortfolioFilters(){
  return {
    portfolio: document.getElementById('pf-filter-portfolio')?.value||'all',
    industry:  document.getElementById('pf-filter-industry')?.value||'all',
    grade:     document.getElementById('pf-filter-grade')?.value||'all',
  };
}

function resetPortfolioFilters(){
  document.getElementById('pf-filter-portfolio').value='all';
  document.getElementById('pf-filter-industry').value='all';
  document.getElementById('pf-filter-grade').value='all';
  renderPortfolio();
}

function applyFilters(accounts){
  const f=getPortfolioFilters();
  return accounts.filter(a=>{
    if(f.portfolio!=='all'&&a.portfolio!==f.portfolio) return false;
    if(f.industry!=='all'&&a.industry!==f.industry) return false;
    if(f.grade!=='all'&&a.grade!==f.grade) return false;
    return true;
  });
}

function renderPortfolio(){
  const filtered=applyFilters(PF_ACCOUNTS);
  const f=getPortfolioFilters();
  const isFiltered=f.portfolio!=='all'||f.industry!=='all'||f.grade!=='all';

  // KPIs from filtered set
  const totalOut=filtered.reduce((s,a)=>s+a.out,0);
  const highRisk=filtered.filter(a=>a.grade==='high');
  const watchList=filtered.filter(a=>a.grade==='watch');
  const atRisk=highRisk.reduce((s,a)=>s+a.out,0)+watchList.reduce((s,a)=>s+a.out,0)*0.4;
  const avgScore=filtered.length?Math.round(filtered.reduce((s,a)=>s+a.score,0)/filtered.length):0;

  // Filter sector forecast if industry selected
  const sectors=f.industry==='all'?SECTOR_FORECAST:SECTOR_FORECAST.filter(s=>s.industry===f.industry);

  // SVG helpers
  const pfNavy='#0F2952';

  // ── Predicted PD line chart ─────────────────────────────────────────────
  // Use a wide viewBox so SVG scales to any container width
  const VW=560,VH=180,PL=38,PR=16,PT=14,PB=44;
  const CW=VW-PL-PR,CH=VH-PT-PB;
  const n=PD_FORECAST.length;
  const xOf=i=>PL+(i/(n-1))*CW;
  const yOf=v=>PT+CH-((v-10)/22)*CH;
  let pdSvg='';
  // Y grid
  [10,15,20,25,30].forEach(v=>{
    const y=yOf(v);
    pdSvg+=`<line x1="${PL}" y1="${y}" x2="${PL+CW}" y2="${y}" stroke="#DDE3EE" stroke-width="1" stroke-dasharray="3,3"/>`;
    pdSvg+=`<text x="${PL-5}" y="${y+3.5}" text-anchor="end" fill="#94A3BC" font-size="9" font-family="Inter">${v}%</text>`;
  });
  // Forecast band
  const predPts=PD_FORECAST.filter(d=>d.predicted!==null);
  if(predPts.length>1){
    const upperPts=predPts.map(d=>`${xOf(PD_FORECAST.indexOf(d))},${yOf(d.predicted+1.8)}`).join(' ');
    const lowerPts=[...predPts].reverse().map(d=>`${xOf(PD_FORECAST.indexOf(d))},${yOf(d.predicted-1.8)}`).join(' ');
    pdSvg+=`<polygon points="${upperPts} ${lowerPts}" fill="#6044CC" fill-opacity="0.10"/>`;
  }
  // Actual line + fill
  const actuals=PD_FORECAST.filter(d=>d.actual!==null);
  const actPts=actuals.map(d=>`${xOf(PD_FORECAST.indexOf(d))},${yOf(d.actual)}`).join(' ');
  const actFill=`${PL},${PT+CH} `+actPts+` ${xOf(actuals.length-1)},${PT+CH}`;
  pdSvg+=`<polygon points="${actFill}" fill="${pfNavy}" fill-opacity="0.07"/>`;
  pdSvg+=`<polyline points="${actPts}" fill="none" stroke="${pfNavy}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
  actuals.forEach(d=>{ const x=xOf(PD_FORECAST.indexOf(d)),y=yOf(d.actual); pdSvg+=`<circle cx="${x}" cy="${y}" r="3.5" fill="${pfNavy}" stroke="#fff" stroke-width="1.5"/>`; });
  // Predicted line (dashed)
  const predFull=[...actuals.slice(-1),...PD_FORECAST.filter(d=>d.predicted!==null&&d.actual===null)];
  const predLinePts=predFull.map(d=>`${xOf(PD_FORECAST.indexOf(d))},${yOf(d.predicted)}`).join(' ');
  pdSvg+=`<polyline points="${predLinePts}" fill="none" stroke="#6044CC" stroke-width="2.5" stroke-dasharray="6,3" stroke-linejoin="round" stroke-linecap="round"/>`;
  predFull.slice(1).forEach(d=>{ const x=xOf(PD_FORECAST.indexOf(d)),y=yOf(d.predicted); pdSvg+=`<circle cx="${x}" cy="${y}" r="4" fill="#6044CC" stroke="#fff" stroke-width="1.5"/><text x="${x}" y="${y-8}" text-anchor="middle" fill="#6044CC" font-size="8.5" font-family="Inter" font-weight="700">${d.predicted}%</text>`; });
  // X labels — all quarters
  PD_FORECAST.forEach((d,i)=>{ if(i%2===0||i===n-1) pdSvg+=`<text x="${xOf(i)}" y="${PT+CH+16}" text-anchor="middle" fill="#94A3BC" font-size="8.5" font-family="Inter">${d.q}</text>`; });
  // Divider
  const splitI=PD_FORECAST.findIndex(d=>d.predicted&&d.actual);
  if(splitI>=0){
    pdSvg+=`<line x1="${xOf(splitI)}" y1="${PT}" x2="${xOf(splitI)}" y2="${PT+CH}" stroke="#6044CC" stroke-width="1.5" stroke-dasharray="4,3" stroke-opacity="0.6"/>`;
    pdSvg+=`<text x="${xOf(splitI)-6}" y="${PT+10}" text-anchor="end" fill="#94A3BC" font-size="8" font-family="Inter">Actual</text>`;
    pdSvg+=`<text x="${xOf(splitI)+6}" y="${PT+10}" text-anchor="start" fill="#6044CC" font-size="8" font-family="Inter" font-weight="700">Predicted →</text>`;
  }

  // ── Migration matrix ──────────────────────────────────────────────────────
  const mGrades=['Healthy','Watch','High Risk'];
  const mColors=[C.green, C.amber, C.red];
  const mBg=(ri,ci,v)=>{
    if(ri===ci) return mColors[ri]+'18';
    if(v>=20)   return C.red+'14';
    return 'transparent';
  };
  const matrixHtml=`
    <div style="font-size:9px;color:var(--muted);margin-bottom:8px">Current grade (rows) → Predicted grade in Q2 FY26 (columns)</div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr>
        <th style="padding:5px 7px;font-size:8.5px;color:var(--muted);text-align:left;border-bottom:1px solid var(--border)">Now ↓</th>
        ${mGrades.map((g,i)=>`<th style="padding:5px 7px;text-align:center;border-bottom:1px solid var(--border);color:${mColors[i]};font-size:9.5px;font-weight:800">${g}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${MIGRATION_MATRIX.data.map((row,ri)=>`<tr>
          <td style="padding:7px;font-weight:800;color:${mColors[ri]};font-size:9.5px;white-space:nowrap">${mGrades[ri]}</td>
          ${row.map((v,ci)=>`<td style="padding:7px;text-align:center;background:${mBg(ri,ci,v)};border-radius:4px">
            <div style="font-size:15px;font-weight:900;color:${ri===ci?mColors[ri]:v>=20?C.red:C.muted};font-family:var(--mono);line-height:1">${v}%</div>

  const bucketLabels=['80–100','60–80','40–60','20–40','0–20'];
  const bucketColors=[C.green,C.green,C.amber,C.red,C.red];
  const hBuckets=[0,0,0,0,0];
  filtered.forEach(a=>{ const b=Math.min(4,Math.floor(a.score/20)); hBuckets[4-b]++; }); // reversed so healthy at top
  const maxB=Math.max(...hBuckets,1);
  const distHtml=bucketLabels.map((lbl,i)=>{

      <div style="width:28px;font-size:9px;font-weight:700;color:${bucketColors[i]};text-align:right;font-family:var(--mono);flex-shrink:0">${pct}%</div>
    </div>`;

  // ── Concentration flags ───────────────────────────────────────────────────
  const highRiskExpPct=Math.round(highRisk.reduce((s,a)=>s+a.out,0)/Math.max(totalOut,0.1)*100);
  const riskFlags=[
    {label:'High-risk exposure',  val:highRiskExpPct+'%', over:highRiskExpPct>15, note:'Threshold 15%'},
    {label:'Top-3 sector share',  val:'52%',              over:true,              note:'Threshold 50%'},
    {label:'Accounts PSI > 0.20', val:'47',               over:true,              note:'Threshold 30'},
  ];

  document.getElementById('portfolio-body').innerHTML=`

  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px">
    <div class="kpi-tile"><div class="lbl">Accounts</div><div style="font-size:22px;font-weight:900;font-family:var(--mono)">${filtered.length.toLocaleString()}</div><div style="font-size:8.5px;color:var(--muted);margin-top:3px">${isFiltered?'filtered view':'total portfolio'}</div></div>
    <div class="kpi-tile"><div class="lbl">Total Exposure</div><div style="font-size:22px;font-weight:900;color:var(--gold);font-family:var(--mono)">₹${totalOut.toFixed(1)} Cr</div></div>
    <div class="kpi-tile" style="border-color:${C.red}22"><div class="lbl">At-Risk Exposure</div><div style="font-size:22px;font-weight:900;color:var(--red);font-family:var(--mono)">₹${atRisk.toFixed(1)} Cr</div><div style="font-size:8.5px;color:var(--muted);margin-top:3px">${Math.round(atRisk/totalOut*100)}% of book</div></div>
    <div class="kpi-tile" style="border-color:${C.amber}22"><div class="lbl">Watch + High Risk</div><div style="font-size:22px;font-weight:900;color:var(--amber);font-family:var(--mono)">${watchList.length+highRisk.length}</div><div style="font-size:8.5px;color:var(--muted);margin-top:3px">${highRisk.length} high · ${watchList.length} watch</div></div>
    <div class="kpi-tile"><div class="lbl">Avg Health Score</div><div style="font-size:22px;font-weight:900;color:${rC(avgScore)};font-family:var(--mono)">${avgScore}</div><div style="font-size:8.5px;color:var(--muted);margin-top:3px">portfolio composite</div></div>
  </div>

  <!-- AI Prediction section -->
  <div style="background:linear-gradient(135deg,#0F2952 0%,#1b3f70 100%);border-radius:12px;padding:16px 18px;margin-bottom:14px">

      <div style="background:rgba(255,255,255,0.15);border-radius:7px;padding:5px 11px;font-size:10px;font-weight:800;color:#fff;letter-spacing:.06em">🤖 AI PORTFOLIO RISK FORECAST</div>
      <div style="font-size:9px;color:rgba(255,255,255,0.55)">EWS ensemble · 6-month forward projection · updated daily</div>
    </div>

    <!-- Row 1: PD chart (wide) + migration matrix -->
    <div style="display:grid;grid-template-columns:3fr 2fr;gap:12px;margin-bottom:12px">

      <!-- PD trend chart -->
      <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px">
        <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:2px">Predicted Default Rate · 6-Month Forward</div>

        <div style="background:#fff;border-radius:8px;padding:12px 14px 8px">
          <svg width="100%" viewBox="0 0 ${VW} ${VH}" style="display:block;overflow:visible">${pdSvg}</svg>
        </div>
        <div style="display:flex;gap:16px;margin-top:10px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:16px;height:2.5px;background:${pfNavy};border-radius:2px"></div>
            <span style="font-size:8.5px;color:rgba(255,255,255,0.6)">Actual portfolio PD</span>
          </div>
          <div style="display:flex;align-items:center;gap:5px">
            <svg width="16" height="10"><line x1="0" y1="5" x2="16" y2="5" stroke="#6044CC" stroke-width="2.5" stroke-dasharray="5,3"/></svg>
            <span style="font-size:8.5px;color:rgba(255,255,255,0.6)">Model prediction</span>
          </div>
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:16px;height:10px;background:#6044CC;opacity:0.18;border-radius:2px"></div>
            <span style="font-size:8.5px;color:rgba(255,255,255,0.6)">Confidence band</span>
          </div>
        </div>
      </div>

      <!-- Migration matrix -->
      <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px">
        <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:2px">Grade Migration · Next Quarter</div>
        <div style="font-size:8.5px;color:rgba(255,255,255,0.5);margin-bottom:12px">Where will each grade be in Q2 FY26?</div>
        <div style="background:#fff;border-radius:8px;padding:10px 12px">${matrixHtml}</div>
      </div>
    </div>

    <!-- Row 2: Score distribution + Concentration flags side by side -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">

      <!-- Score distribution — horizontal bars -->
      <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px">
        <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:2px">Score Distribution</div>
        <div style="font-size:8.5px;color:rgba(255,255,255,0.5);margin-bottom:14px">Accounts by health score band · filtered view</div>
        <div style="background:#fff;border-radius:8px;padding:12px 14px">${distHtml}</div>
      </div>

      <!-- Concentration risk flags -->
      <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:14px 16px">
        <div style="font-size:11px;font-weight:700;color:#fff;margin-bottom:2px">Concentration Risk</div>
        <div style="font-size:8.5px;color:rgba(255,255,255,0.5);margin-bottom:14px">Flags where portfolio concentration exceeds safe thresholds</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${riskFlags.map(({label,val,over,note})=>`
          <div style="background:${over?'rgba(214,59,59,0.18)':'rgba(255,255,255,0.06)'};border-radius:8px;padding:12px 14px;border:1px solid ${over?'rgba(214,59,59,0.4)':'rgba(255,255,255,0.1)'}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start">
              <div>
                <div style="font-size:10.5px;font-weight:700;color:rgba(255,255,255,0.9)">${label}</div>
                <div style="font-size:8px;color:rgba(255,255,255,0.4);margin-top:2px">${note}</div>

                <div style="font-size:8px;color:${over?'rgba(255,100,100,0.8)':'rgba(128,238,176,0.8)'};margin-top:2px">${over?'⚠ Above threshold':'✓ Within limit'}</div>

        </div>
      </div>

    </div>
  </div>

  <!-- Sector forecast table -->
  <!-- Sector forecast table -->
  <div class="card0" style="margin-bottom:14px">
    <div style="padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">

        <div style="font-size:12px;font-weight:800;color:var(--navy)">Sector Risk Forecast · Next 2 Quarters</div>
        <div style="font-size:9px;color:var(--muted);margin-top:1px">Model predicts aggregate score movement per sector based on PSI, feature drift, and borrower-level signals</div>
      </div>

    <table>
      <thead><tr><th>Sector</th><th>Accounts</th><th>Exposure</th><th>Current Avg Score</th><th>Predicted Score (2Q)</th><th>Score Δ</th><th>Migration Risk</th><th>Data Signal</th><th>Outlook</th></tr></thead>

        ${sectors.map(s=>{
          const delta=s.predictedScore-s.currentAvgScore;
          const dCol=delta<-5?C.red:delta<0?C.amber:C.green;
          const trendPill=s.trend==='deteriorating'?'pr':s.trend==='watch'?'pa':s.trend==='improving'?'pg':'pb';
          const trendLabel=s.trend==='deteriorating'?'⬇ Deteriorating':s.trend==='watch'?'→ Watch':s.trend==='improving'?'⬆ Improving':'— Stable';
          return `<tr>
            <td style="font-weight:700">${s.sector}</td>

            <td style="text-align:center;font-family:var(--mono);font-weight:800;color:${dCol}">${delta>0?'+':''}${delta}</td>

          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>

  <!-- Watchlist table -->
  <div class="card0">
    <div style="padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;font-weight:800;color:var(--navy)">Account Watchlist</div>
      <span class="pill pr">${filtered.filter(a=>a.grade!=='healthy').length} accounts requiring attention</span>

        ${filtered.sort((a,b)=>a.score-b.score).slice(0,12).map(a=>`<tr>
          <td style="font-weight:600">${a.name}</td>
          <td style="font-size:9.5px;color:var(--slate)">${{msme_term:'MSME Term',wc_od:'WC OD',kisan:'Kisan',corporate:'Corporate'}[a.portfolio]||a.portfolio}</td>
          <td style="color:var(--slate)">${a.industry.charAt(0).toUpperCase()+a.industry.slice(1)}</td>
          <td style="font-family:var(--mono);color:var(--slate)">₹${a.out} Cr</td>
          <td style="text-align:center"><span style="font-size:15px;font-weight:900;color:${rC(a.score)};font-family:var(--mono)">${a.score}</span></td>
          <td><span class="pill ${rPill(a.score)}">${rL(a.score)}</span></td>
          <td style="font-size:9.5px;color:var(--slate)">${a.drivers}</td>
          <td><span class="pill pgo" style="cursor:pointer;font-size:8.5px">${a.grade==='high'?'Escalate →':'Review →'}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // Update count label
  const countEl=document.getElementById('pf-count');
  if(countEl) countEl.textContent=`Showing ${filtered.length} of ${PF_ACCOUNTS.length} accounts`;
}

    {feat:'Δ OD Utilisation (3M)',   agent:'Behavioural', psi:0.24, s:'warn'},
    {feat:'ITC Claimed / Available', agent:'Consent',     psi:0.21, s:'warn'},
    {feat:'Working Capital Cycle',   agent:'Financial',   psi:0.18, s:'watch'},
    {feat:'GSTR-1 Sales Δ',         agent:'Consent',     psi:0.16, s:'watch'},
    {feat:'Interest Coverage Ratio', agent:'Financial',   psi:0.13, s:'watch'},
    {feat:'Weighted Delinquency',    agent:'Behavioural', psi:0.09, s:'ok'},
    {feat:'Revenue Growth YoY',      agent:'Financial',   psi:0.06, s:'ok'},
  ];
  const events=[
    {d:"Mar 07 '25",type:'warn',e:'PSI breach on OD Utilisation + ITC · Investigate triggered'},
    {d:"Jan 15 '25",type:'ok',  e:'Model v2.4 deployed · AUC 0.91 on holdout · RBI validation passed'},
    {d:"Dec 02 '24",type:'warn',e:'Construction sector PSI 0.28 · score dampening applied'},
    {d:"Oct 18 '24",type:'ok',  e:'Model v2.3 retrained · AUC restored · A/B champion-challenger passed'},
    {d:"Jun 01 '24",type:'info',e:'Model v2.3 training initiated · GST schema v3 features added'},
  ];
  const tpill={warn:'pa',ok:'pg',info:'pb'};
  const tlabel={warn:'WARN',ok:'DEPLOYED',info:'INFO'};
  const cohortRows=cohorts.map(r=>{
    const rw=(r.tp - r.fp - 1.5*r.fn)/r.n;
    const sc=rw>0.05?C.green:rw>0.03?C.amber:C.red;
    const st=rw>0.05?'✓ Stable':rw>0.03?'⚠ Watch':'⛔ Below threshold';
    return {r,rw,sc,st};
  });

  document.getElementById('drift-body').innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px">
    <div class="kpi-tile">
      <div class="lbl">Model Version</div>
      <div style="font-size:20px;font-weight:900;font-family:var(--mono);color:var(--navy)">v2.4</div>
      <div style="font-size:8.5px;color:var(--muted);margin-top:4px">Deployed Jan 15 2025</div>
    </div>
    <div class="kpi-tile" style="border-color:${C.amber}22">
      <div class="lbl">AUC-ROC</div>
      <div style="font-size:26px;font-weight:900;font-family:var(--mono);color:${C.amber}">0.84</div>
      <div style="font-size:8.5px;color:var(--muted);margin-top:4px">Baseline 0.91 · target >0.80 ✓</div>
      <div style="height:3px;background:var(--border);border-radius:2px;margin-top:7px"><div style="height:100%;width:84%;background:${C.amber};border-radius:2px"></div></div>
    </div>
    <div class="kpi-tile" style="border-color:${C.red}22">
      <div class="lbl">Recall</div>
      <div style="font-size:26px;font-weight:900;font-family:var(--mono);color:${C.red}">76%</div>
      <div style="font-size:8.5px;color:${C.red};margin-top:4px">Target >80% ✗ · −8pp from deploy</div>
      <div style="height:3px;background:var(--border);border-radius:2px;margin-top:7px"><div style="height:100%;width:76%;background:${C.red};border-radius:2px"></div></div>
    </div>
    <div class="kpi-tile" style="border-color:${C.amber}22">
      <div class="lbl">Portfolio PSI</div>
      <div style="font-size:26px;font-weight:900;font-family:var(--mono);color:${C.amber}">0.18</div>
      <div style="font-size:8.5px;color:${C.amber};margin-top:4px">2 features breached 0.20</div>
      <div style="height:3px;background:var(--border);border-radius:2px;margin-top:7px"><div style="height:100%;width:72%;background:${C.amber};border-radius:2px"></div></div>
    </div>
    <div class="kpi-tile" style="border-color:${C.red}22">
      <div class="lbl">Retrain Status</div>
      <div style="font-size:13px;font-weight:900;color:${C.red};margin-top:4px;line-height:1.3">⛔ Recommended</div>
      <div style="font-size:8px;color:var(--muted);margin-top:4px">Recall + PSI both breached</div>
      <button id="retrain-btn" onclick="triggerRetrain()" style="margin-top:8px;width:100%;background:${C.red};color:#fff;border:none;border-radius:5px;padding:5px 0;font-size:9px;font-weight:700;cursor:pointer;font-family:var(--sans)">⟳ Queue Retraining</button>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card0">
      <div style="padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--navy)">PSI by Feature · Top Drifting</div>
          <div style="font-size:8.5px;color:var(--muted);margin-top:1px">Live · compares current distributions against training baseline</div>
        </div>
        <span class="pill pa">2 breached</span>
      </div>
      <div style="padding:12px 16px">
        ${psiFeatures.map(({feat,agent,psi,s})=>{
          const col=s==='warn'?C.red:s==='watch'?C.amber:C.green;
          const bg=s==='warn'?C.redD:s==='watch'?C.amberD:'transparent';
          const pill=s==='warn'?'pr':s==='watch'?'pa':'pg';
          const label=s==='warn'?'WARN':s==='watch'?'WATCH':'OK';
          const bw=Math.min(100,Math.round(psi/0.30*100));
          return `<div style="display:flex;align-items:center;gap:10px;padding:7px 10px;background:${bg};border-radius:7px;margin-bottom:4px">
            <div style="flex:1;min-width:0">
              <div style="font-size:10.5px;font-weight:700;color:var(--slate)">${feat}</div>
              <div style="font-size:8px;color:var(--muted)">${agent}</div>
            </div>
            <div style="width:90px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex-shrink:0">
              <div style="height:100%;width:${bw}%;background:${col};border-radius:3px"></div>
            </div>
            <div style="width:28px;font-size:10.5px;font-family:var(--mono);font-weight:800;color:${col};text-align:right;flex-shrink:0">${psi.toFixed(2)}</div>
            <span class="pill ${pill}" style="font-size:7.5px;width:32px;text-align:center;flex-shrink:0">${label}</span>
          </div>`;
        }).join('')}
        <div style="display:flex;gap:14px;padding-top:8px;border-top:1px solid var(--border);font-size:8px;color:var(--muted)">
          <span><span style="color:${C.green}">■</span> &lt;0.10 stable</span>
          <span><span style="color:${C.amber}">■</span> 0.10–0.20 watch</span>
          <span><span style="color:${C.red}">■</span> &gt;0.20 investigate</span>
        </div>
      </div>
    </div>

    <div class="card0">
      <div style="padding:11px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:800;color:var(--navy)">Model Accuracy · Rolling Cohorts</div>
          <div style="font-size:8.5px;color:var(--muted);margin-top:1px">Borrowers scored 6M ago — outcomes confirmed now</div>
        </div>
        <span class="pill pa">Latest below target</span>
      </div>
      <table>
        <thead><tr><th>Scored</th><th>Confirmed</th><th style="text-align:right">Correct ✓</th><th style="text-align:right">Missed ✗</th><th style="text-align:right">Reward</th><th>Status</th></tr></thead>
        <tbody>${cohortRows.map(({r,rw,sc,st})=>`<tr>
          <td style="font-family:var(--mono);font-weight:700">${r.scored}</td>
          <td style="font-family:var(--mono);color:var(--muted)">${r.confirmed}</td>
          <td style="text-align:right;color:${C.green};font-family:var(--mono)">${r.tp}</td>
          <td style="text-align:right;color:${C.red};font-family:var(--mono)">${r.fn}</td>
          <td style="text-align:right;font-family:var(--mono);font-weight:800;color:${sc}">${rw.toFixed(3)}</td>
          <td style="font-size:9px;font-weight:700;color:${sc}">${st}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
  </div>

  <div class="card0">
    <div style="padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:12px;font-weight:800;color:var(--navy)">Governance Audit Trail</div>
      <span class="pill pb">Model v2.4 Active</span>
    </div>
    <div style="padding:4px 16px">
      ${events.map((ev,i)=>`<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;${i<events.length-1?'border-bottom:1px solid var(--border)':''}">
        <span class="pill ${tpill[ev.type]}" style="font-size:7.5px;flex-shrink:0;margin-top:1px;min-width:58px;text-align:center">${tlabel[ev.type]}</span>
        <span style="font-size:8.5px;color:var(--muted);flex-shrink:0;width:66px">${ev.d}</span>
        <span style="font-size:10px;color:var(--slate);line-height:1.45">${ev.e}</span>
      </div>`).join('')}
    </div>
  </div>`;
}
function triggerRetrain(){
  const btn=document.getElementById('retrain-btn');
  if(btn){btn.textContent='✓ Queued';btn.style.background=C.green;btn.disabled=true;}
}

// ══════════════════════════════════════════

renderBorrower();
</script>
